name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

env:
  PYTHON_VERSION: "3.10"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref }})
          if git branch -r --contains $TAG_COMMIT | grep -q 'origin/main'; then
            echo "✅ Tag is on main branch"
          else
            echo "❌ Tag must be created from main branch"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build package
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install twine

      - name: Publish to TestPyPI
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi') ||
          (github.event_name == 'push' && contains(github.ref, 'rc'))
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: twine upload --repository testpypi dist/*

      - name: Publish to PyPI
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi') ||
          (github.event_name == 'release') ||
          (github.event_name == 'push' && !contains(github.ref, 'rc'))
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  deploy-docs:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: |
      (github.event_name == 'release') ||
      (github.event_name == 'push' && !contains(github.ref, 'rc'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install -e ".[docs]"

      - run: pdoc src/caketool -o docs/api/

      - run: mkdocs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: docs

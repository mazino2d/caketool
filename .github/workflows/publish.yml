name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for branch detection

      - name: Verify tag is on main branch
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          # Get the commit that the tag points to
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref }})
          # Check if this commit is on main branch
          if git branch -r --contains $TAG_COMMIT | grep -q 'origin/main'; then
            echo "✅ Tag is on main branch, proceeding with release"
          else
            echo "❌ Error: Tag must be created from main branch"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      # Publish to TestPyPI (manual trigger hoặc tag có chứa 'rc', 'beta', 'alpha')
      - name: Publish to TestPyPI
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi') ||
          (github.event_name == 'push' && contains(github.ref, 'rc'))
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: twine upload --repository testpypi dist/*

      # Publish to PyPI (release hoặc tag không có 'rc')
      - name: Publish to PyPI
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi') ||
          (github.event_name == 'release') ||
          (github.event_name == 'push' && !contains(github.ref, 'rc'))
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

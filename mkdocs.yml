site_name: ML Engineering Blog
site_description: Nguyên lý và thực hành trong machine learning engineering, minh hoạ bằng caketool.
site_url: https://mazino2d.github.io/caketool/
site_author: mazino2d
copyright: Copyright &copy; 2025 mazino2d

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search
  - meta
  - blog:
      blog_dir: blog
      post_date_format: long
      post_url_format: "{slug}"
      archive: false
      categories: false
      pagination: false

extra_javascript:
  - javascripts/back-link.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mazino2d/caketool

nav:
  - Home: index.md
  - API Reference: api/index.html

validation:
  links:
    unrecognized_links: ignore

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details

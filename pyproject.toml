[build-system]
requires = ["setuptools>=61.0.0", "wheel", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "caketool"
dynamic = ["version"]
description = "Common tools for MLOps"
readme = "README.md"
authors = [{ name = "Khoi Do", email = "khoidd@outlook.com" }]
license = "MIT"
classifiers = [
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
]
keywords = ["cake", "ds", "mlops"]
dependencies = [
    # "google-cloud-aiplatform",
    # "google-cloud-storage",
    # "pandas",
    # "numpy",
    # "xgboost",
    # "scikit-learn",
    # "statsmodels",
    # "category_encoders",
    # "catboost",
    # "tqdm",
    # "pyspark==3.3.4"
]
requires-python = ">=3.7"

[project.optional-dependencies]
dev = ["build", "twine", "pip-tools", "pytest", "ipykernel"]

[project.scripts]
caketool = "caketool.__main__:main"

[project.urls]
Homepage = "https://github.com/cake-digital-bank"

[tool.setuptools_scm]
write_to = "src/caketool/_version.py"
